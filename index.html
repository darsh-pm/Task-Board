<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darsh-Task Board</title>
  <!-- Preconnect to CDNs so DNS+TLS is resolved before scripts request -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <!-- Fonts with display=swap: page text visible before font loads -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <!-- Tailwind first — no JS dependency, unblocks layout -->
  <link rel="icon" href="data:,">
  <script>
    tailwind = { config: {} }
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <!-- React production builds (no dev warnings overhead) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Babel last: large script, only needed for JSX transform at parse time -->
  <script>
    window.BABEL_DISABLE_CACHE = true;
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #f5f3ee;
      background-image:
        radial-gradient(circle at 20% 20%, #e8e2d9 0%, transparent 60%),
        radial-gradient(circle at 80% 80%, #ddd5c8 0%, transparent 60%);
      min-height: 100vh;
    }

    .card-enter {
      animation: slideIn 0.2s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-card {
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .task-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.09);
    }

    .col-todo       { border-top: 3px solid #3b82f6; }
    .col-inprogress { border-top: 3px solid #f59e0b; }
    .col-done       { border-top: 3px solid #10b981; }

    .badge-todo       { background: #dbeafe; color: #1d4ed8; }
    .badge-inprogress { background: #fef3c7; color: #b45309; }
    .badge-done       { background: #d1fae5; color: #065f46; }

    input[type="text"]:focus,
    input[type="date"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    textarea:focus {
      outline: none;
      box-shadow: 0 0 0 2px #3b82f6;
    }

    button:focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }

    input[type="date"] {
      color-scheme: light;
    }

    @keyframes authFadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-card {
      animation: authFadeIn 0.25s ease-out;
    }

    /* AI Panel */
    @keyframes panelSlideIn {
      from { opacity: 0; transform: translateY(-10px); max-height: 0; }
      to   { opacity: 1; transform: translateY(0); max-height: 600px; }
    }

    .ai-panel {
      animation: panelSlideIn 0.25s ease-out forwards;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      animation: spin 0.8s linear infinite;
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
    }

    .groq-response { white-space: pre-wrap; }

    /* Modal */
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes backdropIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal-backdrop {
      animation: backdropIn 0.18s ease-out forwards;
    }

    .modal-panel {
      animation: modalIn 0.22s ease-out forwards;
    }

    /* Subtask checkbox */
    .subtask-check {
      appearance: none;
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      border: 1.5px solid #d6d3cd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      position: relative;
      transition: background 0.12s, border-color 0.12s;
    }

    .subtask-check:checked {
      background: #1c1917;
      border-color: #1c1917;
    }

    .subtask-check:checked::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 4px;
      width: 5px;
      height: 8px;
      border: 1.5px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .subtask-done-text {
      text-decoration: line-through;
      color: #a8a29e;
    }

    /* Confirm banner */
    @keyframes confirmIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .confirm-banner {
      animation: confirmIn 0.2s ease-out;
    }

    /* Validation shake */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-5px); }
      40%       { transform: translateX(5px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .field-invalid {
      box-shadow: 0 0 0 2px #ef4444 !important;
      animation: shake 0.35s ease-out;
    }

    /* Overdue filter button active pulse */
    @keyframes overdueGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50%       { box-shadow: 0 0 0 4px rgba(239,68,68,0.1); }
    }
    .overdue-active {
      animation: overdueGlow 2s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { createClient } = supabase;
    const sb = createClient(
      'https://uqbvpytbqvlubuekgcbz.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxYnZweXRicXZsdWJ1ZWtnY2J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NDgwMzcsImV4cCI6MjA5MTAyNDAzN30._SvaS0J-geH725suru-0Gd0S53QuJ1Rd2Sevtg5Bg1E'
      {
        auth: {
          autoRefreshToken: false,
          persistSession: true,
          detectSessionInUrl: false
        }
      }
    );

    const GROQ_KEY = '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';

    /* ── DB row → app task ───────────────────────────── */
    function rowToTask(row) {
      return {
        id:          row.id,
        title:       row.title,
        status:      row.status,
        priority:    row.priority,
        dueDate:     row.due_date || '',
        description: row.description || '',
        subtasks:    Array.isArray(row.subtasks) ? row.subtasks : [],
      };
    }

    const STATUSES = ['todo', 'inprogress', 'done'];
    const COLUMN_META = {
      todo:       { label: 'To Do',       colClass: 'col-todo',       badgeClass: 'badge-todo' },
      inprogress: { label: 'In Progress', colClass: 'col-inprogress', badgeClass: 'badge-inprogress' },
      done:       { label: 'Done',        colClass: 'col-done',       badgeClass: 'badge-done' },
    };

    const PRIORITIES = ['low', 'medium', 'high'];
    const PRIORITY_META = {
      low:    { label: 'Low',    badgeClass: 'bg-stone-100 text-stone-500' },
      medium: { label: 'Medium', badgeClass: 'bg-blue-100 text-blue-700' },
      high:   { label: 'High',   badgeClass: 'bg-red-100 text-red-600' },
    };

    function formatDate(iso) {
      if (!iso) return null;
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function isOverdue(iso) {
      if (!iso) return false;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d) < today;
    }

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    /* ── Groq API call ────────────────────────────────── */
    async function fetchGroqPrioritization(tasks) {
      const activeTasks = tasks.filter(t => t.status !== 'done');
      if (activeTasks.length === 0) return "No active tasks to prioritize.";

      const taskList = activeTasks.map((t, i) => {
        const due = t.dueDate ? `due ${t.dueDate}` : 'no due date';
        return `${i + 1}. "${t.title}" — status: ${t.status}, priority: ${t.priority}, ${due}`;
      }).join('\n');

      const prompt = `You are a productivity assistant. Here are my current active tasks:\n\n${taskList}\n\nAnalyze these tasks and tell me which ones I should focus on first and why. Consider urgency (due dates), priority labels, and current status. Be concise and actionable — a ranked recommendation with brief reasoning for each.`;

      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${GROQ_KEY}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [{ role: 'user', content: prompt }],
          max_tokens: 1000,
        }),
      });

      if (!res.ok) {
        const errBody = await res.json().catch(() => ({}));
        throw new Error(errBody?.error?.message || `Groq API error: ${res.status}`);
      }

      const data = await res.json();
      return data.choices?.[0]?.message?.content || 'No response received.';
    }

    /* ── AuthForm ─────────────────────────────────────── */
    function AuthForm() {
      const [mode, setMode] = React.useState('login');
      const [email, setEmail] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [error, setError] = React.useState('');

      async function handleSubmit(e) {
        e.preventDefault();
        setError('');
        setLoading(true);
        if (mode === 'login') {
          const { error } = await sb.auth.signInWithPassword({ email, password });
          if (error) setError(error.message);
        } else {
          const { error } = await sb.auth.signUp({ email, password });
          if (error) setError(error.message);
        }
        setLoading(false);
      }

      return (
        <div className="min-h-screen flex items-center justify-center px-4">
          <div className="auth-card w-full max-w-sm">
            <div className="mb-8 text-center">
              <h1 className="font-display text-3xl font-800 text-stone-900 tracking-tight">Task Board</h1>
              <p className="font-mono text-xs text-stone-400 mt-1">
                {mode === 'login' ? 'sign in to continue' : 'create your account'}
              </p>
            </div>
            <div className="bg-white rounded-2xl border border-stone-200 shadow-sm px-7 py-8">
              {error && (
                <div className="mb-5 font-mono text-xs text-red-600 bg-red-50 border border-red-100 rounded-xl px-4 py-3">{error}</div>
              )}
              <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                <div className="flex flex-col gap-1.5">
                  <label className="font-mono text-xs text-stone-500">Email</label>
                  <input type="email" value={email} onChange={e => setEmail(e.target.value)} required placeholder="you@example.com"
                    className="font-mono text-sm bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-stone-800 placeholder-stone-300 transition-shadow" />
                </div>
                <div className="flex flex-col gap-1.5">
                  <label className="font-mono text-xs text-stone-500">Password</label>
                  <input type="password" value={password} onChange={e => setPassword(e.target.value)} required placeholder="••••••••" minLength={6}
                    className="font-mono text-sm bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-stone-800 placeholder-stone-300 transition-shadow" />
                </div>
                <button type="submit" disabled={loading}
                  className="mt-2 font-display font-600 text-sm bg-stone-900 text-white px-6 py-3 rounded-xl hover:bg-stone-700 active:scale-95 transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                  {loading ? 'Please wait…' : mode === 'login' ? 'Sign In' : 'Sign Up'}
                </button>
              </form>
            </div>
            <p className="font-mono text-xs text-stone-400 text-center mt-5">
              {mode === 'login' ? "Don't have an account? " : 'Already have an account? '}
              <button onClick={() => { setMode(mode === 'login' ? 'signup' : 'login'); setError(''); }}
                className="text-stone-700 underline underline-offset-2 hover:text-stone-900 transition-colors">
                {mode === 'login' ? 'Sign up' : 'Sign in'}
              </button>
            </p>
          </div>
        </div>
      );
    }

    /* ── AIPriorityPanel ──────────────────────────────── */
    function AIPriorityPanel({ response, onClose }) {
      return (
        <div className="ai-panel mb-8 bg-white border border-stone-200 rounded-2xl shadow-sm overflow-hidden">
          <div className="flex items-center justify-between px-5 py-3.5 border-b border-stone-100 bg-stone-50">
            <div className="flex items-center gap-2">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" className="text-amber-500">
                <path d="M7 1L8.5 5.5L13 7L8.5 8.5L7 13L5.5 8.5L1 7L5.5 5.5L7 1Z" stroke="currentColor" strokeWidth="1.3" strokeLinejoin="round" fill="currentColor" fillOpacity="0.15"/>
              </svg>
              <span className="font-display font-700 text-sm text-stone-800 tracking-tight">AI Priority Analysis</span>
              <span className="font-mono text-[10px] text-stone-400 bg-stone-100 px-2 py-0.5 rounded-full">llama3-8b</span>
            </div>
            <button onClick={onClose}
              className="w-6 h-6 flex items-center justify-center rounded-lg text-stone-400 hover:bg-stone-200 hover:text-stone-600 transition-colors text-base leading-none"
              title="Dismiss">×</button>
          </div>
          <div className="px-5 py-4">
            <p className="groq-response font-mono text-xs text-stone-600 leading-relaxed">{response}</p>
          </div>
        </div>
      );
    }

    /* ── TaskDetailModal ──────────────────────────────── */
    function TaskDetailModal({ task, onClose, onCancel, onSave, onMoveStatus, showError, isNewTask }) {
      const [title, setTitle] = React.useState(task.title);
      const [priority, setPriority] = React.useState(task.priority);
      const [dueDate, setDueDate] = React.useState(task.dueDate);
      const [description, setDescription] = React.useState(task.description);
      const [subtasks, setSubtasks] = React.useState(task.subtasks);
      const [newSubtask, setNewSubtask] = React.useState('');
      const [saving, setSaving] = React.useState(false);
      const [confirmDone, setConfirmDone] = React.useState(false);

      // Validation state
      const [validationError, setValidationError] = React.useState('');
      const [invalidFields, setInvalidFields] = React.useState([]);

      // Track whether all subtasks are done
      const allDone = subtasks.length > 0 && subtasks.every(s => s.done);

      React.useEffect(() => {
        if (allDone && task.status !== 'done') {
          setConfirmDone(true);
        } else {
          setConfirmDone(false);
        }
      }, [allDone, task.status]);

      // Validate mandatory fields before allowing close
      function validateMandatoryFields() {
        const missing = [];
        const labels = [];
        if (!dueDate) { missing.push('dueDate'); labels.push('Due date'); }
        if (!description.trim()) { missing.push('description'); labels.push('Description'); }
        // priority always has a value; check it's not empty string just in case
        if (!priority) { missing.push('priority'); labels.push('Priority'); }

        if (missing.length > 0) {
          setInvalidFields(missing);
          setValidationError(`Required before closing: ${labels.join(', ')}`);
          // Clear highlight after animation
          setTimeout(() => setInvalidFields([]), 800);
          return false;
        }
        setValidationError('');
        setInvalidFields([]);
        return true;
      }

      // X button: if new task → cancel (delete it); if existing → validate then close
      function handleXClose() {
        if (isNewTask) {
          onCancel(task.id); // delete the just-created stub
        } else {
          if (!validateMandatoryFields()) return;
          onClose();
        }
      }

      // Save button: validate; show success state but keep modal open
      const [saveSuccess, setSaveSuccess] = React.useState(false);
      function handleSave() {
        if (!validateMandatoryFields()) return;
        setSaveSuccess(true);
        setTimeout(() => setSaveSuccess(false), 1800);
      }

      function handleClose() {
        // Backdrop click: same as X
        handleXClose();
      }

      // Escape key: same as X
      React.useEffect(() => {
        function onKeyDown(e) {
          if (e.key === 'Escape') handleXClose();
        }
        window.addEventListener('keydown', onKeyDown);
        return () => window.removeEventListener('keydown', onKeyDown);
      }, [dueDate, description, priority, isNewTask]);

      async function save(patch) {
        setSaving(true);
        await onSave(task.id, patch);
        setSaving(false);
      }

      async function handleTitleBlur() {
        const trimmed = title.trim();
        if (!trimmed) { setTitle(task.title); return; }
        if (trimmed !== task.title) await save({ title: trimmed });
      }

      async function handlePriorityChange(e) {
        const val = e.target.value;
        setPriority(val);
        await save({ priority: val });
        // Clear validation if now filled
        setInvalidFields(prev => prev.filter(f => f !== 'priority'));
      }

      async function handleDueDateChange(e) {
        const val = e.target.value;
        setDueDate(val);
        await save({ due_date: val || null });
        if (val) setInvalidFields(prev => prev.filter(f => f !== 'dueDate'));
      }

      async function handleDescriptionBlur() {
        if (description !== task.description) {
          await save({ description: description || null });
        }
        if (description.trim()) setInvalidFields(prev => prev.filter(f => f !== 'description'));
      }

      async function toggleSubtask(id) {
        const updated = subtasks.map(s => s.id === id ? { ...s, done: !s.done } : s);
        setSubtasks(updated);
        await save({ subtasks: updated });
      }

      async function deleteSubtask(id) {
        const updated = subtasks.filter(s => s.id !== id);
        setSubtasks(updated);
        await save({ subtasks: updated });
      }

      async function addSubtask(e) {
        e.preventDefault();
        const text = newSubtask.trim();
        if (!text) return;
        const updated = [...subtasks, { id: uid(), text, done: false }];
        setSubtasks(updated);
        setNewSubtask('');
        await save({ subtasks: updated });
      }

      async function handleMoveToDone() {
        await onMoveStatus(task.id, 'done');
        setConfirmDone(false);
        onClose();
      }

      const completedCount = subtasks.filter(s => s.done).length;

      function fieldClass(base, fieldName) {
        return `${base} ${invalidFields.includes(fieldName) ? 'field-invalid' : ''}`;
      }

      return (
        <div
          className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center px-4"
          style={{ background: 'rgba(28,25,23,0.45)', backdropFilter: 'blur(4px)' }}
          onClick={e => { if (e.target === e.currentTarget) handleXClose(); }}
        >
          <div className="modal-panel bg-white rounded-2xl shadow-xl border border-stone-200 w-full max-w-lg max-h-[90vh] flex flex-col overflow-hidden">

            {/* Header */}
            <div className="flex items-center justify-between px-6 py-4 border-b border-stone-100">
              <div className="flex items-center gap-2">
                <span className={`font-mono text-[10px] font-medium px-2 py-0.5 rounded-full ${COLUMN_META[task.status].badgeClass}`}>
                  {COLUMN_META[task.status].label}
                </span>
                {saving && <span className="font-mono text-[10px] text-stone-400">saving…</span>}
              </div>
              <button onClick={handleXClose}
                className="flex items-center gap-1.5 w-7 h-7 justify-center rounded-lg text-stone-400 hover:bg-stone-100 hover:text-stone-600 transition-colors text-lg leading-none"
                title={isNewTask ? 'Cancel — discard this task' : 'Close'}>
                {isNewTask
                  ? <span className="font-mono text-xs text-stone-500 px-2 py-1 rounded-lg border border-stone-200 hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition-colors whitespace-nowrap">Cancel</span>
                  : '×'
                }
              </button>
            </div>

            {/* Validation error banner */}
            {validationError && (
              <div className="confirm-banner mx-6 mt-4 flex items-center gap-3 bg-red-50 border border-red-200 rounded-xl px-4 py-3">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" className="text-red-500 shrink-0">
                  <circle cx="7" cy="7" r="6" stroke="currentColor" strokeWidth="1.4"/>
                  <line x1="7" y1="4" x2="7" y2="7.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
                  <circle cx="7" cy="9.5" r="0.7" fill="currentColor"/>
                </svg>
                <p className="font-mono text-xs text-red-700 flex-1">{validationError}</p>
                <button onClick={() => setValidationError('')}
                  className="font-mono text-xs text-red-400 hover:text-red-600 transition-colors shrink-0">×</button>
              </div>
            )}

            {/* Scrollable body */}
            <div className="flex-1 overflow-y-auto px-6 py-5 flex flex-col gap-5">

              {/* All-subtasks-done confirm banner */}
              {confirmDone && (
                <div className="confirm-banner flex items-center justify-between gap-3 bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3">
                  <p className="font-mono text-xs text-emerald-700">All subtasks complete — mark task as Done?</p>
                  <div className="flex items-center gap-2 shrink-0">
                    <button onClick={() => setConfirmDone(false)}
                      className="font-mono text-xs text-stone-400 hover:text-stone-600 transition-colors">Dismiss</button>
                    <button onClick={handleMoveToDone}
                      className="font-mono text-xs bg-emerald-600 text-white px-3 py-1.5 rounded-lg hover:bg-emerald-700 transition-colors">
                      Move to Done
                    </button>
                  </div>
                </div>
              )}

              {/* Title */}
              <div className="flex flex-col gap-1.5">
                <label className="font-mono text-[11px] text-stone-400 uppercase tracking-widest">Title</label>
                <input
                  type="text"
                  value={title}
                  onChange={e => setTitle(e.target.value)}
                  onBlur={handleTitleBlur}
                  className="font-display font-700 text-xl text-stone-900 tracking-tight bg-transparent border-b border-stone-200 pb-1 focus:border-blue-400 focus:outline-none transition-colors"
                  style={{ boxShadow: 'none' }}
                />
              </div>

              {/* Priority + Due Date row */}
              <div className="flex gap-4 flex-wrap">
                <div className="flex flex-col gap-1.5 flex-1 min-w-28">
                  <label className="font-mono text-[11px] text-stone-400 uppercase tracking-widest">
                    Priority <span className="text-red-400">*</span>
                  </label>
                  <select value={priority} onChange={handlePriorityChange}
                    className={fieldClass("font-mono text-sm bg-stone-50 border border-stone-200 rounded-xl px-3 py-2 text-stone-700 focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer", 'priority')}>
                    {PRIORITIES.map(p => <option key={p} value={p}>{PRIORITY_META[p].label}</option>)}
                  </select>
                </div>
                <div className="flex flex-col gap-1.5 flex-1 min-w-36">
                  <label className="font-mono text-[11px] text-stone-400 uppercase tracking-widest">
                    Due Date <span className="text-red-400">*</span>
                  </label>
                  <input type="date" value={dueDate} onChange={handleDueDateChange}
                    className={fieldClass("font-mono text-sm bg-stone-50 border border-stone-200 rounded-xl px-3 py-2 text-stone-700 focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer", 'dueDate')} />
                </div>
              </div>

              {/* Description — mandatory */}
              <div className="flex flex-col gap-1.5">
                <label className="font-mono text-[11px] text-stone-400 uppercase tracking-widest">
                  Description <span className="text-red-400">*</span>
                </label>
                <textarea
                  value={description}
                  onChange={e => setDescription(e.target.value)}
                  onBlur={handleDescriptionBlur}
                  placeholder="Add a description…"
                  rows={3}
                  className={fieldClass("font-mono text-sm bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-stone-700 placeholder-stone-300 resize-none transition-shadow", 'description')}
                />
              </div>

              {/* Subtasks — optional */}
              <div className="flex flex-col gap-2.5">
                <div className="flex items-center justify-between">
                  <label className="font-mono text-[11px] text-stone-400 uppercase tracking-widest">
                    Subtasks <span className="text-stone-300 normal-case tracking-normal">(optional)</span>
                  </label>
                  {subtasks.length > 0 && (
                    <span className="font-mono text-[11px] text-stone-400">
                      {completedCount}/{subtasks.length}
                    </span>
                  )}
                </div>

                {subtasks.length > 0 && (
                  <div className="h-1 bg-stone-100 rounded-full overflow-hidden">
                    <div
                      className="h-full bg-emerald-400 rounded-full transition-all duration-300"
                      style={{ width: `${(completedCount / subtasks.length) * 100}%` }}
                    />
                  </div>
                )}

                <div className="flex flex-col gap-1.5">
                  {subtasks.map(s => (
                    <div key={s.id} className="flex items-start gap-2.5 group py-1">
                      <input
                        type="checkbox"
                        checked={s.done}
                        onChange={() => toggleSubtask(s.id)}
                        className="subtask-check mt-0.5"
                      />
                      <span className={`flex-1 font-mono text-sm leading-snug ${s.done ? 'subtask-done-text' : 'text-stone-700'}`}>
                        {s.text}
                      </span>
                      <button
                        onClick={() => deleteSubtask(s.id)}
                        className="opacity-0 group-hover:opacity-100 w-5 h-5 flex items-center justify-center rounded text-stone-300 hover:text-red-400 hover:bg-red-50 transition-all text-sm leading-none shrink-0"
                        title="Delete subtask">×</button>
                    </div>
                  ))}
                </div>

                <form onSubmit={addSubtask} className="flex gap-2 mt-1">
                  <input
                    type="text"
                    value={newSubtask}
                    onChange={e => setNewSubtask(e.target.value)}
                    placeholder="Add a subtask…"
                    className="flex-1 font-mono text-sm bg-stone-50 border border-stone-200 rounded-xl px-3 py-2 text-stone-700 placeholder-stone-300 transition-shadow"
                  />
                  <button
                    type="submit"
                    disabled={!newSubtask.trim()}
                    className="font-mono text-xs bg-stone-900 text-white px-4 py-2 rounded-xl hover:bg-stone-700 active:scale-95 transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                  >Add</button>
                </form>
              </div>
            </div>

            {/* Footer */}
            <div className="px-6 py-4 border-t border-stone-100 flex items-center justify-between">
              <p className="font-mono text-[10px] text-stone-400">
                <span className="text-red-400">*</span> required fields
              </p>
              <button onClick={handleSave}
                className={`font-mono text-xs px-4 py-2 rounded-xl transition-all ${
                  saveSuccess
                    ? 'bg-emerald-600 text-white border border-emerald-600'
                    : 'text-stone-700 border border-stone-300 bg-white hover:bg-stone-900 hover:text-white hover:border-stone-900'
                }`}>
                {saveSuccess ? '✓ Saved' : 'Save'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ── TaskCard ─────────────────────────────────────── */
    function TaskCard({ task, onMove, onDelete, onEdit, onOpenDetail }) {
      const idx = STATUSES.indexOf(task.status);
      // Change 4: hide due date on Done cards
      const showDate = task.status !== 'done';
      const formattedDate = showDate ? formatDate(task.dueDate) : null;
      const overdue = showDate && isOverdue(task.dueDate);

      const [editing, setEditing] = React.useState(false);
      const [draft, setDraft] = React.useState('');
      const inputRef = React.useRef(null);

      const completedSubtasks = task.subtasks.filter(s => s.done).length;
      const totalSubtasks = task.subtasks.length;

      function startEdit(e) {
        e.stopPropagation();
        setDraft(task.title);
        setEditing(true);
        setTimeout(() => inputRef.current && inputRef.current.focus(), 0);
      }

      function saveEdit() {
        onEdit(task.id, draft);
        if (draft.trim()) setEditing(false);
      }

      function handleKeyDown(e) {
        if (e.key === 'Enter') saveEdit();
        if (e.key === 'Escape') setEditing(false);
      }

      return (
        <div className="task-card card-enter bg-white rounded-xl px-4 py-3 shadow-sm border border-stone-100">
          <div className="flex items-start gap-3">
            {editing ? (
              <input
                ref={inputRef}
                type="text"
                value={draft}
                onChange={e => setDraft(e.target.value)}
                onKeyDown={handleKeyDown}
                onClick={e => e.stopPropagation()}
                className="flex-1 font-mono text-sm bg-stone-50 border border-stone-200 rounded-lg px-2 py-0.5 text-stone-700 min-w-0"
              />
            ) : (
              <button
                onClick={() => onOpenDetail(task)}
                className="flex-1 font-mono text-sm text-stone-700 leading-snug pt-0.5 break-words min-w-0 text-left hover:text-stone-900 transition-colors"
                title="Open task detail"
              >
                {task.title}
              </button>
            )}
            <span className={`font-mono text-[10px] font-medium px-2 py-0.5 rounded-full shrink-0 mt-0.5 ${(PRIORITY_META[task.priority] || PRIORITY_META['medium']).badgeClass}`}>
              {(PRIORITY_META[task.priority] || PRIORITY_META['medium']).label}
            </span>
            <div className="flex items-center gap-1 shrink-0">
              {editing ? (
                <button onClick={saveEdit}
                  className="font-mono text-[11px] font-medium px-2 py-1 rounded-lg bg-stone-900 text-white hover:bg-stone-700 transition-colors">Save</button>
              ) : (
                <>
                  <button onClick={startEdit} title="Edit task"
                    className="w-7 h-7 flex items-center justify-center rounded-lg text-stone-400 hover:bg-stone-100 hover:text-stone-600 transition-colors">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M8.5 1.5a1.414 1.414 0 0 1 2 2L3.5 10.5 1 11l.5-2.5 7-7z" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </button>
                  <button onClick={e => { e.stopPropagation(); onMove(task.id, 'left'); }} disabled={idx === 0} title="Move left"
                    className="w-7 h-7 flex items-center justify-center rounded-lg text-stone-400 hover:bg-stone-100 hover:text-stone-600 disabled:opacity-20 disabled:cursor-not-allowed transition-colors">←</button>
                  <button onClick={e => { e.stopPropagation(); onMove(task.id, 'right'); }} disabled={idx === STATUSES.length - 1} title="Move right"
                    className="w-7 h-7 flex items-center justify-center rounded-lg text-stone-400 hover:bg-stone-100 hover:text-stone-600 disabled:opacity-20 disabled:cursor-not-allowed transition-colors">→</button>
                  <button onClick={e => { e.stopPropagation(); onDelete(task.id); }} title="Delete task"
                    className="w-7 h-7 flex items-center justify-center rounded-lg text-stone-300 hover:bg-red-50 hover:text-red-400 transition-colors ml-0.5">×</button>
                </>
              )}
            </div>
          </div>

          {/* Meta row: date (hidden for done) + subtask progress */}
          <div className="flex items-center gap-3 mt-1.5">
            {formattedDate && (
              <div className={`flex items-center gap-1 font-mono text-[11px] ${overdue ? 'text-red-500' : 'text-stone-400'}`}>
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
                  <rect x="1" y="2" width="10" height="9" rx="1.5" stroke="currentColor" strokeWidth="1.2" fill="none"/>
                  <line x1="4" y1="1" x2="4" y2="3" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
                  <line x1="8" y1="1" x2="8" y2="3" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
                  <line x1="1" y1="5" x2="11" y2="5" stroke="currentColor" strokeWidth="1"/>
                </svg>
                {formattedDate}
              </div>
            )}
            {totalSubtasks > 0 && (
              <div className="flex items-center gap-1.5 font-mono text-[11px] text-stone-400">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
                  <rect x="1" y="1" width="4" height="4" rx="1" stroke="currentColor" strokeWidth="1.1" fill="none"/>
                  <path d="M2.5 3l.8.8 1.7-1.7" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round" strokeLinejoin="round"/>
                  <rect x="7" y="1" width="4" height="4" rx="1" stroke="currentColor" strokeWidth="1.1" fill="none"/>
                  <rect x="1" y="7" width="4" height="4" rx="1" stroke="currentColor" strokeWidth="1.1" fill="none"/>
                  <rect x="7" y="7" width="4" height="4" rx="1" stroke="currentColor" strokeWidth="1.1" fill="none"/>
                </svg>
                {completedSubtasks}/{totalSubtasks}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ── Column ───────────────────────────────────────── */
    function Column({ status, tasks, onMove, onDelete, onEdit, onOpenDetail }) {
      const { label, colClass, badgeClass } = COLUMN_META[status];
      return (
        <div className={`flex flex-col bg-stone-50 rounded-2xl shadow-sm border border-stone-200 ${colClass} overflow-hidden`}>
          <div className="flex items-center justify-between px-5 py-4 border-b border-stone-100">
            <h2 className="font-display font-700 text-stone-800 text-base tracking-tight">{label}</h2>
            <span className={`font-mono text-xs font-medium px-2.5 py-0.5 rounded-full ${badgeClass}`}>
              {tasks.length}
            </span>
          </div>
          <div className="flex flex-col gap-2.5 p-4 flex-1 min-h-32">
            {tasks.length === 0 && (
              <p className="text-xs font-mono text-stone-300 text-center mt-6">empty</p>
            )}
            {tasks.map(task => (
              <TaskCard key={task.id} task={task} onMove={onMove} onDelete={onDelete} onEdit={onEdit} onOpenDetail={onOpenDetail} />
            ))}
          </div>
        </div>
      );
    }

    /* ── ErrorBanner ──────────────────────────────────── */
    function ErrorBanner({ message, onClose }) {
      if (!message) return null;
      return (
        <div className="flex items-center justify-between bg-red-600 text-white font-mono text-sm px-5 py-3 rounded-xl mb-6 shadow-sm">
          <span>{message}</span>
          <button onClick={onClose}
            className="ml-4 w-6 h-6 flex items-center justify-center rounded-md hover:bg-red-500 transition-colors text-white text-base leading-none"
            title="Dismiss">×</button>
        </div>
      );
    }

    /* ── TaskBoard ────────────────────────────────────── */
    function TaskBoard({ user }) {
      const [tasks, setTasks] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [input, setInput] = React.useState('');
      const [error, setError] = React.useState('');
      const [aiLoading, setAiLoading] = React.useState(false);
      const [aiResponse, setAiResponse] = React.useState(null);
      const [detailTask, setDetailTask] = React.useState(null);
      const [isNewTask, setIsNewTask] = React.useState(false); // true when modal opened from Add button
      const [overdueFilter, setOverdueFilter] = React.useState(false);

      const errorTimerRef = React.useRef(null);

      function showError(msg) {
        setError(msg);
        clearTimeout(errorTimerRef.current);
        errorTimerRef.current = setTimeout(() => setError(''), 3000);
      }

      function dismissError() {
        clearTimeout(errorTimerRef.current);
        setError('');
      }

      React.useEffect(() => {
        async function fetchTasks() {
          const { data, error } = await sb
            .from('tasks')
            .select('*')
            .order('created_at', { ascending: false });

          if (error) {
            showError('Failed to load tasks: ' + error.message);
          } else {
            setTasks(data.map(rowToTask));
          }
          setLoading(false);
        }
        fetchTasks();
      }, []);

      async function handleAIPrioritize() {
        if (aiLoading) return;
        setAiResponse(null);
        setAiLoading(true);
        try {
          const result = await fetchGroqPrioritization(tasks);
          setAiResponse(result);
        } catch (err) {
          showError('AI prioritization failed: ' + err.message);
        } finally {
          setAiLoading(false);
        }
      }

      // Change 1: Add form only has title; immediately opens modal after creating task
      async function addTask(e) {
        e.preventDefault();
        const title = input.trim();
        if (!title) { showError('Title cannot be empty.'); return; }

        const newRow = { title, status: 'todo', priority: 'low', due_date: null };
        const { data, error } = await sb.from('tasks').insert(newRow).select().single();

        if (error) { showError('Failed to add task: ' + error.message); return; }

        const created = rowToTask(data);
        setTasks(prev => [created, ...prev]);
        setInput('');
        // Immediately open detail modal for the new task, flagged as new
        setIsNewTask(true);
        setDetailTask(created);
      }

      async function cancelNewTask(id) {
        setDetailTask(null);
        setIsNewTask(false);
        setTasks(prev => prev.filter(t => t.id !== id));
        await sb.from('tasks').delete().eq('id', id);
      }

      async function moveTask(id, direction) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;

        const idx = STATUSES.indexOf(task.status);
        const nextIdx = direction === 'left' ? idx - 1 : idx + 1;
        if (nextIdx < 0 || nextIdx >= STATUSES.length) return;

        const nextStatus = STATUSES[nextIdx];
        setTasks(prev => prev.map(t => t.id === id ? { ...t, status: nextStatus } : t));

        const { error } = await sb.from('tasks').update({ status: nextStatus }).eq('id', id);

        if (error) {
          setTasks(prev => prev.map(t => t.id === id ? { ...t, status: task.status } : t));
          showError('Failed to move task: ' + error.message);
        }
      }

      async function moveTaskToStatus(id, status) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;

        setTasks(prev => prev.map(t => t.id === id ? { ...t, status } : t));

        const { error } = await sb.from('tasks').update({ status }).eq('id', id);

        if (error) {
          setTasks(prev => prev.map(t => t.id === id ? { ...t, status: task.status } : t));
          showError('Failed to update task status: ' + error.message);
        }
      }

      async function deleteTask(id) {
        const snapshot = tasks;
        setTasks(prev => prev.filter(t => t.id !== id));

        const { error } = await sb.from('tasks').delete().eq('id', id);

        if (error) {
          setTasks(snapshot);
          showError('Failed to delete task: ' + error.message);
        }
      }

      async function editTask(id, newTitle) {
        const title = newTitle.trim();
        if (!title) { showError('Title cannot be empty.'); return; }

        const task = tasks.find(t => t.id === id);
        if (!task) return;

        setTasks(prev => prev.map(t => t.id === id ? { ...t, title } : t));

        const { error } = await sb.from('tasks').update({ title }).eq('id', id);

        if (error) {
          setTasks(prev => prev.map(t => t.id === id ? { ...t, title: task.title } : t));
          showError('Failed to update task: ' + error.message);
        }
      }

      async function patchTask(id, patch) {
        setTasks(prev => prev.map(t => {
          if (t.id !== id) return t;
          const updated = { ...t };
          if ('title' in patch)       updated.title       = patch.title;
          if ('priority' in patch)    updated.priority    = patch.priority;
          if ('due_date' in patch)    updated.dueDate     = patch.due_date || '';
          if ('description' in patch) updated.description = patch.description || '';
          if ('subtasks' in patch)    updated.subtasks    = patch.subtasks || [];
          return updated;
        }));

        setDetailTask(prev => {
          if (!prev || prev.id !== id) return prev;
          const updated = { ...prev };
          if ('title' in patch)       updated.title       = patch.title;
          if ('priority' in patch)    updated.priority    = patch.priority;
          if ('due_date' in patch)    updated.dueDate     = patch.due_date || '';
          if ('description' in patch) updated.description = patch.description || '';
          if ('subtasks' in patch)    updated.subtasks    = patch.subtasks || [];
          return updated;
        });

        const { error } = await sb.from('tasks').update(patch).eq('id', id);

        if (error) {
          showError('Failed to save: ' + error.message);
        }
      }

      async function handleLogout() {
        await sb.auth.signOut();
      }

      // Change 3: overdue filter logic
      const overdueCount = tasks.filter(t =>
        t.status !== 'done' && isOverdue(t.dueDate)
      ).length;

      function getColumnTasks(status) {
        if (!overdueFilter) return tasks.filter(t => t.status === status);
        // Overdue filter: only todo/inprogress with past due date
        if (status === 'done') return []; // done column hidden via render logic
        return tasks.filter(t =>
          t.status === status && isOverdue(t.dueDate)
        );
      }

      const activeCount = tasks.filter(t => t.status !== 'done').length;
      const visibleStatuses = overdueFilter ? ['todo', 'inprogress'] : STATUSES;

      return (
        <div className="min-h-screen px-6 py-10 max-w-6xl mx-auto">
          <ErrorBanner message={error} onClose={dismissError} />

          {/* Header */}
          <div className="mb-8 flex items-start justify-between gap-4">
            <div>
              <h1 className="font-display text-3xl font-800 text-stone-900 tracking-tight mb-1">Task Board</h1>
              <p className="font-mono text-xs text-stone-400">
                {loading ? 'Loading…' : `${tasks.length} task${tasks.length !== 1 ? 's' : ''} total`}
              </p>
            </div>
            <div className="flex items-center gap-2 pt-1 shrink-0 flex-wrap justify-end">

              {/* Change 3: Overdue filter button */}
              <button
                onClick={() => setOverdueFilter(f => !f)}
                disabled={loading}
                title={overdueFilter ? 'Clear overdue filter' : 'Show overdue tasks only'}
                className={`flex items-center gap-2 font-mono text-xs px-3 py-1.5 rounded-lg border transition-all shadow-sm disabled:opacity-40 disabled:cursor-not-allowed
                  ${overdueFilter
                    ? 'bg-red-600 text-white border-red-700 hover:bg-red-700 overdue-active'
                    : overdueCount > 0
                      ? 'bg-red-50 text-red-700 border-red-200 hover:bg-red-100 hover:border-red-300'
                      : 'bg-white text-stone-500 border-stone-200 hover:bg-stone-100'
                  }`}
              >
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <circle cx="6" cy="6" r="5" stroke="currentColor" strokeWidth="1.3"/>
                  <line x1="6" y1="3.5" x2="6" y2="6.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
                  <circle cx="6" cy="8.2" r="0.7" fill="currentColor"/>
                </svg>
                Overdue
                {overdueCount > 0 && (
                  <span className={`font-mono text-[10px] font-medium px-1.5 py-0.5 rounded-full min-w-[18px] text-center
                    ${overdueFilter ? 'bg-white text-red-600' : 'bg-red-500 text-white'}`}>
                    {overdueCount}
                  </span>
                )}
              </button>

              <button onClick={handleAIPrioritize} disabled={aiLoading || loading || activeCount === 0}
                title={activeCount === 0 ? 'No active tasks to analyze' : 'Analyze tasks with AI'}
                className="flex items-center gap-2 font-mono text-xs border border-amber-300 bg-amber-50 text-amber-800 px-3 py-1.5 rounded-lg hover:bg-amber-100 hover:border-amber-400 transition-colors shadow-sm disabled:opacity-40 disabled:cursor-not-allowed">
                {aiLoading ? (
                  <><span className="spinner" style={{borderColor:'rgba(180,83,9,0.3)', borderTopColor:'#b45309'}}></span>Analyzing…</>
                ) : (
                  <>
                    <svg width="12" height="12" viewBox="0 0 14 14" fill="none" className="text-amber-500">
                      <path d="M7 1L8.5 5.5L13 7L8.5 8.5L7 13L5.5 8.5L1 7L5.5 5.5L7 1Z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round" fill="currentColor" fillOpacity="0.2"/>
                    </svg>
                    AI Prioritize
                  </>
                )}
              </button>
              <span className="font-mono text-xs text-stone-400 hidden sm:block truncate max-w-[180px]">{user.email}</span>
              <button onClick={handleLogout}
                className="font-mono text-xs text-stone-500 border border-stone-200 bg-white px-3 py-1.5 rounded-lg hover:bg-stone-100 hover:text-stone-800 transition-colors shadow-sm">
                Sign out
              </button>
            </div>
          </div>

          {/* Overdue filter active indicator */}
          {overdueFilter && (
            <div className="confirm-banner mb-6 flex items-center justify-between gap-3 bg-red-50 border border-red-200 rounded-xl px-4 py-3">
              <div className="flex items-center gap-2">
                <svg width="13" height="13" viewBox="0 0 12 12" fill="none" className="text-red-500 shrink-0">
                  <circle cx="6" cy="6" r="5" stroke="currentColor" strokeWidth="1.3"/>
                  <line x1="6" y1="3.5" x2="6" y2="6.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
                  <circle cx="6" cy="8.2" r="0.7" fill="currentColor"/>
                </svg>
                <p className="font-mono text-xs text-red-700">
                  Showing {overdueCount} overdue task{overdueCount !== 1 ? 's' : ''} — Done column hidden
                </p>
              </div>
              <button onClick={() => setOverdueFilter(false)}
                className="font-mono text-xs text-red-500 hover:text-red-700 underline underline-offset-2 transition-colors shrink-0">
                Clear filter
              </button>
            </div>
          )}

          {/* AI Panel */}
          {aiResponse !== null && (
            <AIPriorityPanel response={aiResponse} onClose={() => setAiResponse(null)} />
          )}

          {/* Change 1: Add Task Form — title only */}
          <form onSubmit={addTask} className="flex gap-3 mb-10 flex-wrap">
            <input type="text" value={input} onChange={e => setInput(e.target.value)} placeholder="New task title…"
              className="flex-1 font-mono text-sm bg-white border border-stone-200 rounded-xl px-4 py-3 text-stone-800 placeholder-stone-300 shadow-sm transition-shadow min-w-40" />
            <button type="submit"
              className="font-display font-600 text-sm bg-stone-900 text-white px-6 py-3 rounded-xl hover:bg-stone-700 active:scale-95 transition-all shadow-sm">
              Add
            </button>
          </form>

          {/* Columns — Change 3: done hidden when overdueFilter active */}
          {loading ? (
            <div className={`grid grid-cols-1 gap-5 ${overdueFilter ? 'md:grid-cols-2' : 'md:grid-cols-3'}`}>
              {visibleStatuses.map(s => (
                <div key={s} className={`flex flex-col bg-stone-50 rounded-2xl shadow-sm border border-stone-200 ${COLUMN_META[s].colClass} overflow-hidden`}>
                  <div className="flex items-center justify-between px-5 py-4 border-b border-stone-100">
                    <h2 className="font-display font-700 text-stone-800 text-base tracking-tight">{COLUMN_META[s].label}</h2>
                  </div>
                  <div className="p-4">
                    <div className="h-16 bg-stone-100 rounded-xl animate-pulse" />
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div className={`grid grid-cols-1 gap-5 ${overdueFilter ? 'md:grid-cols-2' : 'md:grid-cols-3'}`}>
              {visibleStatuses.map(status => (
                <Column key={status} status={status} tasks={getColumnTasks(status)}
                  onMove={moveTask} onDelete={deleteTask} onEdit={editTask}
                  onOpenDetail={t => { setIsNewTask(false); setDetailTask(t); }} />
              ))}
            </div>
          )}

          {/* Detail Modal */}
          {detailTask && (
            <TaskDetailModal
              task={detailTask}
              onClose={() => { setDetailTask(null); setIsNewTask(false); }}
              onCancel={cancelNewTask}
              onSave={patchTask}
              onMoveStatus={moveTaskToStatus}
              showError={showError}
              isNewTask={isNewTask}
            />
          )}
        </div>
      );
    }

    /* ── App (auth gate) ──────────────────────────────── */
    function App() {
      const [user, setUser] = React.useState(null);

      React.useEffect(() => {
        sb.auth.getSession()
          .then(({ data }) => {
            setUser(data?.session?.user ?? false);
          })
          .catch(() => {
            setUser(false);
          });

        const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? false);
        });

        return () => subscription.unsubscribe();
      }, []);

      if (user === null) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <p className="font-mono text-xs text-stone-400">Loading…</p>
          </div>
        );
      }

      if (user === false) return <AuthForm />;
      return <TaskBoard user={user} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
